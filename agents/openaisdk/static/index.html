<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agente de Películas</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f9f7f4;
      color: #1a1a1a;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Layout principal ── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Panel de chat ── */
    .chat-panel {
      display: flex;
      flex-direction: column;
      width: 420px;
      flex-shrink: 0;
      background: #fff;
      border-right: 1px solid #e8e3dc;
    }

    .chat-header {
      padding: 18px 20px 14px;
      border-bottom: 1px solid #f0ebe4;
    }

    .chat-header h1 {
      font-size: 0.95rem;
      font-weight: 600;
      color: #1a1a1a;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .chat-header p {
      font-size: 0.78rem;
      color: #9b8ea0;
      margin-top: 3px;
    }

    .avatar-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #e8d5f0, #d4e8f5);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      flex-shrink: 0;
    }

    /* ── Mensajes ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: #e0d8d0; border-radius: 4px; }

    .msg-row {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .msg-row.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .msg-avatar.agent {
      background: linear-gradient(135deg, #e8d5f0, #d4e8f5);
      color: #7c5c8a;
    }

    .msg-avatar.user-av {
      background: #f0ebe4;
      color: #7a6b5a;
    }

    .msg-bubble {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 0.875rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg-row.user .msg-bubble {
      background: #f0ebe4;
      color: #1a1a1a;
      border-top-right-radius: 4px;
    }

    .msg-row.agent .msg-bubble {
      background: #faf9f8;
      border: 1px solid #f0ebe4;
      color: #1a1a1a;
      border-top-left-radius: 4px;
    }

    .msg-row.system-row {
      justify-content: center;
    }

    .msg-system {
      font-size: 0.75rem;
      color: #b5a8b0;
      text-align: center;
      padding: 2px 10px;
    }

    .msg-error {
      background: #fdf2f2;
      border: 1px solid #f5c6c6;
      color: #c0392b;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.825rem;
    }

    /* Indicador de escritura */
    .typing-row {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .typing-bubble {
      background: #faf9f8;
      border: 1px solid #f0ebe4;
      border-radius: 16px;
      border-top-left-radius: 4px;
      padding: 12px 16px;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .typing-bubble span {
      width: 6px;
      height: 6px;
      background: #c4b5c8;
      border-radius: 50%;
      animation: bounce 1.3s infinite;
    }

    .typing-bubble span:nth-child(2) { animation-delay: 0.18s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.36s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-5px); opacity: 1; }
    }

    /* ── Input ── */
    .input-area {
      padding: 16px 20px;
      border-top: 1px solid #f0ebe4;
      background: #fff;
    }

    .input-wrap {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      background: #faf9f8;
      border: 1px solid #e8e3dc;
      border-radius: 14px;
      padding: 10px 12px 10px 16px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .input-wrap:focus-within {
      border-color: #c9b8d4;
      box-shadow: 0 0 0 3px #f0e8f5;
    }

    .input-wrap textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #1a1a1a;
      font-size: 0.875rem;
      font-family: inherit;
      resize: none;
      min-height: 22px;
      max-height: 120px;
      line-height: 1.5;
    }

    .input-wrap textarea::placeholder { color: #c4b8bc; }

    .input-wrap button {
      background: #1a1a1a;
      border: none;
      color: #fff;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, opacity 0.15s;
    }

    .input-wrap button:hover { background: #333; }
    .input-wrap button:disabled { opacity: 0.3; cursor: not-allowed; }

    .input-wrap button svg {
      width: 15px;
      height: 15px;
      fill: currentColor;
    }

    .input-hint {
      font-size: 0.72rem;
      color: #c4b8bc;
      margin-top: 8px;
      text-align: center;
    }

    /* ── Panel PDF ── */
    .pdf-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #f4f1ed;
      overflow: hidden;
    }

    .pdf-header {
      padding: 18px 20px 14px;
      background: #fff;
      border-bottom: 1px solid #e8e3dc;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .pdf-header h2 {
      font-size: 0.875rem;
      font-weight: 500;
      color: #1a1a1a;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pdf-header a {
      font-size: 0.78rem;
      color: #7c5c8a;
      text-decoration: none;
      background: #f0e8f5;
      padding: 5px 12px;
      border-radius: 20px;
      white-space: nowrap;
      transition: background 0.15s;
    }

    .pdf-header a:hover { background: #e4d5ef; }

    .pdf-placeholder {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      color: #c4b8bc;
    }

    .pdf-placeholder-icon {
      width: 56px;
      height: 56px;
      background: #ede8e2;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .pdf-placeholder-icon svg {
      width: 28px;
      height: 28px;
      stroke: #b5a8a0;
      fill: none;
      stroke-width: 1.5;
    }

    .pdf-placeholder p {
      font-size: 0.825rem;
      color: #b5a8b0;
    }

    iframe#pdf-viewer {
      flex: 1;
      border: none;
      display: none;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>

<div class="main">

  <!-- Chat -->
  <div class="chat-panel">
    <div class="chat-header">
      <h1>
        <div class="avatar-icon">🎬</div>
        Agente de Películas
      </h1>
      <p>Busca películas y genera reportes PDF</p>
    </div>

    <div class="messages" id="messages">
      <div class="msg-row system-row">
        <span class="msg-system">Escribe tu solicitud para comenzar</span>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrap">
        <textarea
          id="input"
          placeholder="Crea un reporte de las mejores películas de 2024…"
          rows="1"
        ></textarea>
        <button id="send-btn" title="Enviar">
          <svg viewBox="0 0 16 16"><path d="M1.5 1.5l13 6.5-13 6.5V9.5l9-3-9-3V1.5z"/></svg>
        </button>
      </div>
      <p class="input-hint">Intro para enviar · Shift+Intro para nueva línea</p>
    </div>
  </div>

  <!-- PDF -->
  <div class="pdf-panel">
    <div class="pdf-header">
      <h2 id="pdf-name">Sin reporte generado</h2>
      <a id="pdf-download" href="#" download style="display:none">↓ Descargar PDF</a>
    </div>

    <div class="pdf-placeholder" id="pdf-placeholder">
      <div class="pdf-placeholder-icon">
        <svg viewBox="0 0 24 24">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
      </div>
      <p>El reporte aparecerá aquí una vez generado</p>
    </div>

    <iframe id="pdf-viewer"></iframe>
  </div>

</div>

<script>
  const messagesEl  = document.getElementById('messages');
  const inputEl     = document.getElementById('input');
  const sendBtn     = document.getElementById('send-btn');
  const pdfViewer   = document.getElementById('pdf-viewer');
  const pdfHolder   = document.getElementById('pdf-placeholder');
  const pdfName     = document.getElementById('pdf-name');
  const pdfDownload = document.getElementById('pdf-download');

  let currentAgentEl = null;
  let typingEl = null;

  function scrollDown() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addRow(role, text) {
    const row = document.createElement('div');

    if (role === 'system') {
      row.className = 'msg-row system-row';
      row.innerHTML = `<span class="msg-system">${text}</span>`;
      messagesEl.appendChild(row);
      scrollDown();
      return null;
    }

    if (role === 'error') {
      row.className = 'msg-row system-row';
      row.innerHTML = `<div class="msg-error">${text}</div>`;
      messagesEl.appendChild(row);
      scrollDown();
      return null;
    }

    row.className = `msg-row ${role}`;
    const avatarLabel = role === 'user' ? 'Tú' : 'AI';
    const avatarClass = role === 'user' ? 'user-av' : 'agent';
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = text;
    row.innerHTML = `<div class="msg-avatar ${avatarClass}">${avatarLabel}</div>`;
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollDown();
    return bubble;
  }

  function showTyping() {
    typingEl = document.createElement('div');
    typingEl.className = 'typing-row';
    typingEl.innerHTML = `
      <div class="msg-avatar agent">AI</div>
      <div class="typing-bubble">
        <span></span><span></span><span></span>
      </div>`;
    messagesEl.appendChild(typingEl);
    scrollDown();
  }

  function hideTyping() {
    if (typingEl) { typingEl.remove(); typingEl = null; }
  }

  function showPdf(filename) {
    const url = `/static/${filename}`;
    pdfViewer.src = url;
    pdfViewer.style.display = 'block';
    pdfHolder.style.display = 'none';
    pdfName.textContent = filename;
    pdfDownload.href = url;
    pdfDownload.download = filename;
    pdfDownload.style.display = 'inline';
  }

  async function sendMessage() {
    const prompt = inputEl.value.trim();
    if (!prompt || sendBtn.disabled) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    addRow('user', prompt);
    showTyping();
    currentAgentEl = null;

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt }),
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const payload = JSON.parse(line.slice(6));

          if (payload.type === 'text') {
            hideTyping();
            if (!currentAgentEl) {
              currentAgentEl = addRow('agent', '');
            }
            currentAgentEl.textContent += payload.content;
            scrollDown();

          } else if (payload.type === 'done') {
            hideTyping();
            if (payload.error) addRow('error', `Error: ${payload.error}`);
            if (payload.cost)  addRow('system', `Costo: ${payload.cost}`);
            if (payload.pdf)   showPdf(payload.pdf);

          } else if (payload.type === 'error') {
            hideTyping();
            addRow('error', payload.content);
          }
        }
      }
    } catch (err) {
      hideTyping();
      addRow('error', `Error de conexión: ${err.message}`);
    } finally {
      sendBtn.disabled = false;
      currentAgentEl = null;
    }
  }

  sendBtn.addEventListener('click', sendMessage);

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = `${Math.min(inputEl.scrollHeight, 120)}px`;
  });
</script>

</body>
</html>
